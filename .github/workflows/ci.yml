name: CI

# Guardrails for the plugin marketplace. Three jobs:
#   validate        — every script parses, every JSON is valid, the dashboard test suite passes,
#                     every *.test.sh runs (ubuntu, bash 5.x).
#   validate-bash32 — the SAME shell test suite executed by macOS's /bin/bash 3.2.57 — the
#                     harness's actual declared target. Ubuntu's bash 5 can't catch a bash-4+
#                     builtin slipping in (mapfile, ${var,,}, …); this job runs the real thing so
#                     that regression class fails at PR time instead of on a consumer's Mac.
#   conventions — enforce the repo's #1 gotchas with tooling instead of discipline:
#                 (1) any change to a plugin's files ships WITH a version bump in its plugin.json
#                     (the plugin cache only re-installs on a version change);
#                 (2) any change under templates/ ships WITH a MIGRATIONS.md entry (the upgrade
#                     skill is ledger-driven — a missing entry never reaches existing installs);
#                 (3) any implementation-harness version bump ships with an up-to-date
#                     CHECKSUMS.jsonl — self-healing: this one regenerates + auto-commits the fix
#                     on a direct push to main (never on a PR, and never a plain "did it change"
#                     check — it recomputes the real hashes and diffs, so it also catches a stale
#                     entry, not just a missing one). See gen-checksums.sh's own header for why the
#                     underlying regeneration is safe to run unattended: it's pure, deterministic,
#                     read-only re-derivation from the checked-out tree, nothing it does can ever
#                     silently corrupt a hash — the diff against what's committed is the guardrail.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # explicit least-privilege — this job never writes anything
    steps:
      - uses: actions/checkout@v4

      - name: bash -n every shell script
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r -d '' f; do
            bash -n "$f" || { echo "SYNTAX ERROR: $f"; fail=1; }
          done < <(find plugins -name '*.sh' -print0)
          exit "$fail"

      - name: node --check every JS file + run every *.test.js
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r -d '' f; do
            node --check "$f" || { echo "PARSE ERROR: $f"; fail=1; }
          done < <(find plugins -name '*.js' -print0)
          [ "$fail" = 0 ]
          # auto-discover node tests (lib.test.js, dashboard-render.test.js, …) — mirrors the *.test.sh finder
          while IFS= read -r -d '' t; do
            echo "== $t =="; node "$t" || fail=1
          done < <(find plugins -name '*.test.js' -print0)
          [ "$fail" = 0 ]

      - name: run harness shell test suites (*.test.sh)
        timeout-minutes: 10
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r -d '' t; do
            echo "── running $t"
            bash "$t" || { echo "TEST FAILED: $t"; fail=1; }
          done < <(find plugins -name '*.test.sh' -print0)
          exit "$fail"

      - name: repo-lock.sh --selftest (not a *.test.sh, so the finder above misses it)
        timeout-minutes: 2
        run: bash plugins/implementation-harness/templates/scripts/repo-lock.sh --selftest

      - name: jq empty every JSON file
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r -d '' f; do
            jq empty "$f" || { echo "BAD JSON: $f"; fail=1; }
          done < <(find plugins .claude-plugin -name '*.json' -print0)
          exit "$fail"

  validate-bash32:
    runs-on: macos-latest   # ships /bin/bash 3.2.57 — the harness's declared target shell
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: run harness shell test suites under /bin/bash 3.2
        timeout-minutes: 15
        run: |
          set -euo pipefail
          /bin/bash --version | head -1
          fail=0
          while IFS= read -r -d '' t; do
            echo "── running $t (bash 3.2)"
            /bin/bash "$t" || { echo "TEST FAILED (bash 3.2): $t"; fail=1; }
          done < <(find plugins -name '*.test.sh' -print0)
          /bin/bash plugins/implementation-harness/templates/scripts/repo-lock.sh --selftest \
            || { echo "TEST FAILED (bash 3.2): repo-lock.sh --selftest"; fail=1; }
          exit "$fail"

  conventions:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed only for the CHECKSUMS.jsonl auto-heal commit below (push to main)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: resolve the diff range
        id: range
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
            git fetch --quiet origin "${{ github.base_ref }}"
            echo "range=${base}...HEAD" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ] \
            && git cat-file -e "${{ github.event.before }}" 2>/dev/null; then
            echo "range=${{ github.event.before }}..HEAD" >> "$GITHUB_OUTPUT"
          else
            echo "range=HEAD~1..HEAD" >> "$GITHUB_OUTPUT"   # new branch / force push — best effort
          fi

      - name: plugin change ⇒ version bump (same push)
        run: |
          set -euo pipefail
          range="${{ steps.range.outputs.range }}"
          changed="$(git diff --name-only "$range" -- 'plugins/' || true)"
          [ -n "$changed" ] || { echo "no plugin files changed — ok"; exit 0; }
          fail=0
          for plugin in $(printf '%s\n' "$changed" | cut -d/ -f2 | sort -u); do
            manifest="plugins/$plugin/.claude-plugin/plugin.json"
            [ -f "$manifest" ] || continue
            if ! git diff "$range" -- "$manifest" | grep -q '^+.*"version"'; then
              echo "::error::plugins/$plugin changed without a version bump in $manifest — the plugin cache only re-installs on a version change, so this change silently never reaches consumers."
              fail=1
            fi
          done
          exit "$fail"

      - name: templates/ change ⇒ MIGRATIONS.md entry (same push)
        run: |
          set -euo pipefail
          range="${{ steps.range.outputs.range }}"
          tpl="plugins/implementation-harness/templates"
          ledger="plugins/implementation-harness/skills/implementation-harness-upgrade/MIGRATIONS.md"
          if [ -n "$(git diff --name-only "$range" -- "$tpl" || true)" ] \
            && [ -z "$(git diff --name-only "$range" -- "$ledger" || true)" ]; then
            echo "::error::$tpl changed without a $ledger entry — the upgrade skill is ledger-driven, so this change never reaches existing installs on upgrade."
            exit 1
          fi
          echo "ok"

      - name: implementation-harness version bump ⇒ CHECKSUMS.jsonl regenerated (self-healing)
        run: |
          set -euo pipefail
          range="${{ steps.range.outputs.range }}"
          manifest="plugins/implementation-harness/.claude-plugin/plugin.json"
          checksums="plugins/implementation-harness/skills/implementation-harness-upgrade/CHECKSUMS.jsonl"
          gen="plugins/implementation-harness/skills/implementation-harness-upgrade/gen-checksums.sh"

          if ! git diff "$range" -- "$manifest" | grep -q '^+.*"version"'; then
            echo "no implementation-harness version bump — ok"
            exit 0
          fi

          cp "$checksums" /tmp/checksums.before
          bash "$gen" --append

          if diff -q /tmp/checksums.before "$checksums" >/dev/null; then
            echo "ok — CHECKSUMS.jsonl already matches (matches whether it's a missing OR a stale entry, since this recomputes the real hashes rather than only checking presence)"
            exit 0
          fi

          echo "CHECKSUMS.jsonl was stale for this version bump — regenerated:"
          diff /tmp/checksums.before "$checksums" || true

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "::error::CHECKSUMS.jsonl is stale and this is a PR — auto-commit only runs on a direct push to main (pushing a fix back to an arbitrary PR head is a separate, more fragile mechanism this repo doesn't need). Run \`bash $gen --append\` locally, commit, and update this PR."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$checksums"
          git commit -m "ci: auto-regenerate CHECKSUMS.jsonl for $(jq -r .version "$manifest") [skip ci]"
          git push origin HEAD:main
          echo "auto-committed the regenerated CHECKSUMS.jsonl"
